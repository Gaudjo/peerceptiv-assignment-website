<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mama G's | Contact us</title>

    <!--Uses jsDelivr to deliver a cached version of Bootstrap's compiled CSS and JavaScript-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="CSS/styles.css" rel="stylesheet">
    <link href="CSS/fonts.css" rel="stylesheet">

<!----------------------------ADDS-GOOGLE-FONTS--------------------------------->
    <!--ADDS LORA, DANCING SCRIPT AND PLAYBALL FONTS-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&family=Lora:ital,wght@0,400..700;1,400..700&family=Playball&display=swap" rel="stylesheet">

</head>

<body class="contact">

    <header>
        <!--GLOBAL NAVBAR-->
        <nav>
            <img src="img/restaurant-logo.png" alt="Mama G's Logo">
            <ul class="global-nav">
                <li><a href="index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li>Contact Us</li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <h2>Our address: 124 Wallaby Way</h2><br>
        <h2>Our Phone Number: 603-123-4567</h2><br>


        <p>Use the form below to put in for a table reservation, or send us a message!</p>

        <div class="form-box">
            <form action="thankyou.html">
                <label>Type:</label>
                <input type="radio" name="type" required> Reservation
                <input type="radio" name="type" required> Message <br>

                <label for="fname">First Name:</label><br>
                <input type="text" id="fname" name="fname" required> *<br>

                <label for="lname">Last Name:</label><br>
                <input type="text" id="lname" name="lname"><br>

                <label for="email">E-mail:</label><br>
                <input type="email" name="email" id="email" 
                    placeholder="you@example.com" required> *<br>

                <label for="phone">Phone:</label><br>
                <input type="text" name="phone" id="phone" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}" 
                    placeholder="XXX-XXX-XXXX"><br>

                <label for="people">People:</label><br>
                <input type="number" name="people" id="people" size="8" min="0" max="10"
                    step="1" value="0"><br>

                <label for="message">Message:</label><br>
                <textarea id="message" name="message" rows="5" cols="32"></textarea><br>

                <input type="submit" value="Submit">
            </form>  

        </div>
        
    </main>

    <footer>
        <p>&copy Copyright by Josh</p>
    </footer>

</body>
</html>
